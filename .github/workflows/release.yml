name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: darwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev gcc-aarch64-linux-gnu

      - name: Build Application
        run: wails build -clean

      - name: Archive macOS binaries
        if: matrix.os == 'macos-latest'
        run: |
          cd build/bin
          zip -r Glyph-macOS.zip Glyph.app

      - name: Archive Linux binaries
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd build/bin
          tar -czvf Glyph-Linux.tar.gz glyph

      - name: Archive Windows binaries
        if: matrix.os == 'windows-latest'
        run: |
          cd build\bin
          Compress-Archive -Path glyph.exe -DestinationPath Glyph-Windows.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/bin/Glyph-macOS.zip
            build/bin/Glyph-Linux.tar.gz
            build/bin/Glyph-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
